name: Daily Petrol Price Extraction

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-eng \
            libtesseract-dev \
            libleptonica-dev \
            libpoppler-cpp-dev \
            libpng-dev \
            libjpeg-dev \
            libcurl4-openssl-dev
          # Verify critical headers exist
          dpkg -l | grep -E 'libjpeg-dev|libpoppler-cpp-dev|libtesseract-dev'

      - name: Install R packages
        run: |
          Rscript -e '
            install.packages(
              c("qpdf", "pdftools", "tesseract", "png", "tidyr", "dplyr", "lubridate"),
              repos = "https://cloud.r-project.org",
              Ncpus = 2
            )
            # Verify all packages load
            library(png)
            library(tesseract)
            library(tidyr)
            library(dplyr)
            library(lubridate)
            cat("All packages loaded successfully\n")
          '

      - name: Run extraction
        run: Rscript scripts/extract_petrol_data.R

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/petrol_prices.csv
          git diff --staged --quiet || git commit -m "Update petrol prices $(date +%Y-%m-%d)"
          git push
