name: Daily Petrol Price Extraction

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpng-dev \
            tesseract-ocr \
            tesseract-ocr-eng \
            libtesseract-dev \
            libleptonica-dev \
            libcurl4-openssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libtiff5-dev \
            libjpeg-dev \
            libpoppler-cpp-dev \
            pkg-config
          echo "--- Verify tesseract is installed ---"
          tesseract --version
          pkg-config --modversion tesseract

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'

      - name: Install R packages
        run: |
          Rscript -e '
            options(warn = 2)
            install.packages(c("png", "tidyr", "dplyr", "lubridate"), repos="https://cloud.r-project.org")
            install.packages("tesseract", repos="https://cloud.r-project.org", type="source")
            library(png)
            library(tesseract)
            library(tidyr)
            library(dplyr)
            library(lubridate)
            cat("All packages loaded successfully\n")
          '

      - name: Run extraction
        run: Rscript scripts/extract_petrol_data.R

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/petrol_prices.csv
          git diff --staged --quiet || git commit -m "Update petrol prices $(date +%Y-%m-%d)"
          git push
